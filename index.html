שוק חלבון ממיקרו-אצות: 840 מיליון דולר היום, צפי 2.7 מיליארד ב-2032. IRR פרויקט 16.5%, IRR קיבוץ 12%. 20–30 עובדים. אין חסמים רגולטוריים לביומסה.

שלב א' (קרית גת): 3M$. שלב ב' (יטבתה 2028–2030): 15M$, 430 טון/שנה. שלב ג' (2032+): 12M$, 1,200 טון/שנה. סה"כ 30M$ לפני מענקים.

=== 24.05.2026 – הון אנושי, מימון, מיקום ===
מחיר שוק: $35–40/ק"ג בעסקאות בפועל. IRR פסימי (ירידת מחיר+עלות 30%) עדיין חיובי.
הון אנושי שלב א': 22 משרות (4 מטה, 6 מקצועי, 12 ייצור). שלב ב': 34 משרות.
מימון: ~50 מיליון ₪. 3 אפשרויות: (א) הלוואה דרך המיזם, (ב) הלוואה דרך קיבוץ, (ג) מינוף חלקי. כישלון טוטאלי = 6M₪/שנה לעשור – לא מסכן את יטבתה.
חשיפה מקסימלית: 50M₪. עלתה אפשרות שותפות עם קיבוצי ערבה.

=== נושאים נוספים בפרוטוקולים ===

שכר עבודת חברים:
- 22.12.2024: שכר חברים יגדל ב-6% ב-2025 → 167,400 ₪ עלות מעביד שנתית (במקום 11.1% לפי הנוסחה).
- 21.12.2025: דיון בעדכון שכר 2026, הצגת מודל שכר חדש.

- תקציב השקעות 2026: 5.8M₪ (4.3M₪ פחת + 1.5M₪ צמיחה + קרן רב-שנתית 2M₪).

השקעות יצרניות 2026 שאושרו:
- רפת: 1.46M₪ (סלף, קירור, חשמל)

פרויקט אגרו-סולארי וחרובים (29.03.2026):
שותפות עם דוראל – 150 דונם. שלב ראשון: 50 דונם חרובים. הכנסה בטוחה: 4,200₪/דונם/שנה. הקמה: סוף 2026.

עופאים (ביצים):
דיונים מרובים 2024–2025 על תוצאות, תקציב ואתגרים בענף.

ברוול שדה סולארי ומילואוטיס:

אישור חידוש 2 חדרי חשמל (שני חדרים בני 40 שנה, מצב קריטי).

ערבה פאוור / מתח גבוה (06.04.2025):
דיון בשדרוג תשתיות חשמל ושיתוף פעולה עם ערבה פאוור.

const SYSTEM_PROMPT = `אתה עוזר חכם של ועדת המשק של קיבוץ יטבתה. 
התפקיד שלך: לענות על שאלות על פרוטוקולי הוועדה בצורה ברורה, מדויקת ותמציתית.

כללים:
1. ענה תמיד בעברית.
2. בסס תשובות רק על הפרוטוקולים שניתנו לך.
3. ציין תאריכים כשרלוונטי.
4. אם המידע לא נמצא בפרוטוקולים – אמור זאת בכנות.
5. היה ידידותי וישיר.

${PROTOCOLS_CONTEXT}`;

let history = [];

const TOPICS = {
  business: [
    'סכם את כל הדיונים בנושא ברוול',
    'מה הוחלט לגבי השקעה בפריסימוס?',
    'אילו חברות נבחנו להשקעה בשנים האחרונות?',
    'מה מצב ההשקעה בוי-קורלס ואלמוגים?'
  ],
  results: [
    'מה היו תוצאות המשק בשנת 2024?',
    'מה גובה שכר העבודה הנוכחי של חברי יטבתה?',
    'מה מסגרת תקציב ההשקעות ל-2026?',
    'מה מקורות ההכנסה העיקריים של הקיבוץ?'
  ],
  branches: [
    'מה קורה בענף העופות (עופאים)?',
    'מה המצב בענף הרפת ומחלבת יטבתה?',
    'מה נדון לגבי ענף התמרים?',
    'מה הסטטוס של ענף השלחין?'
  ]
};

function showTopic(btn, topic) {
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const box = document.getElementById('suggestions');
  box.innerHTML = '';
  TOPICS[topic].forEach(q => {
    const b = document.createElement('button');
    b.className = 'suggestion-btn';
    b.textContent = q;
    b.onclick = () => askSuggestion(b);
    box.appendChild(b);
  });
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  
  const typingId = addTyping();
  document.getElementById('send').disabled = true;

  history.push({ role: 'user', content: text });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();
    removeTyping(typingId);

    const reply = data.content?.[0]?.text || 'אירעה שגיאה. נסה שוב.';
    history.push({ role: 'assistant', content: reply });
    addMessage('ai', reply);

  } catch (e) {
    removeTyping(typingId);
    addMessage('ai', 'שגיאת חיבור. בדוק את החיבור לאינטרנט ונסה שוב.');
  }

  document.getElementById('send').disabled = false;
  input.focus();
}

function addMessage(role, text) {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="avatar ${role}">${role === 'ai' ? '🤖' : 'חב'}</div>
    <div class="bubble">${escapeHtml(text)}</div>
  `;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function addTyping() {
  const box = document.getElementById('chatBox');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = id;
  div.innerHTML = `
    <div class="avatar ai">🤖</div>
    <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
  `;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function askSuggestion(btn) {
  document.getElementById('userInput').value = btn.textContent;
  sendMessage();
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>

</html>
